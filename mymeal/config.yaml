name: myMeal
version: "1.1.13"
slug: mymeal
description: Recipes, AI meal planning & smart shopping lists with a Home Assistant cooking assistant
url: https://github.com/Amantux/mymeal
# Pull the multi-arch image published by CI instead of building on-device.
image: ghcr.io/amantux/mymeal
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
ingress: true
ingress_port: 7850
panel_icon: mdi:silverware-fork-knife
panel_title: myMeal
# Advertise to Home Assistant so the companion integration auto-discovers us.
discovery:
  - mymeal
# Query the Supervisor to auto-discover a companion Edibl add-on.
hassio_api: true
# manager role is needed to LIST/inspect sibling add-ons (e.g. Edibl) via the
# Supervisor — the default role can only read this add-on's own info.
hassio_role: manager
# Expose the MCP server (SSE) so the Home Assistant MCP Client can connect.
# Ports are INTERNAL-ONLY by default (null = not published to the host). myMeal
# is used via the sidebar (ingress), and Home Assistant reaches the MCP server
# on the internal network — neither needs a host port. To allow LAN access
# (e.g. the MCP Client from another machine, or the HACS integration over the
# network), set a host port for the relevant line in the add-on's Network tab.
ports:
  7850/tcp: null
  7851/tcp: null
ports_description:
  7850/tcp: myMeal REST API — map only for direct LAN / HACS-over-network access (Ingress does not need it)
  7851/tcp: myMeal MCP server (SSE) — map only to reach it from outside Home Assistant
map:
  - share:rw
options:
  disable_auth: true
  allow_registration: false
  enable_mcp: true
  mcp_server_token: ""
  ai_provider: ""
  ollama_host: ""
  ollama_model: ""
  claude_model: ""
  openai_model: ""
  anthropic_api_key: ""
  openai_api_key: ""
  edibl_url: ""
  edibl_token: ""
schema:
  disable_auth: bool
  allow_registration: bool
  enable_mcp: bool
  # Token Home Assistant's MCP Client must present. Leave blank on a trusted
  # network; set it before mapping the MCP port to the LAN.
  mcp_server_token: "password?"
  ai_provider: "list(|claude|ollama|openai)?"
  # AI provider config can be set here OR in the app UI (the app remembers UI
  # changes and they override these). Keys use HA's masked password type.
  ollama_host: "str?"
  ollama_model: "str?"
  claude_model: "str?"
  openai_model: "str?"
  anthropic_api_key: "password?"
  openai_api_key: "password?"
  # Companion Edibl food-inventory app. Usually auto-discovered — leave blank.
  edibl_url: "str?"
  edibl_token: "password?"
