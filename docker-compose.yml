services:
  mymeal:
    build: .
    container_name: mymeal
    ports:
      - "7850:7850"
    environment:
      # MYMEAL_SECRET_KEY is intentionally NOT set here. Left unset, myMeal
      # generates a strong key once and persists it to /data/.secret_key, so
      # restarts do not log everyone out. Set it explicitly only if you need the
      # same key across several instances — placeholder values are rejected.
      #   MYMEAL_SECRET_KEY: "<32+ random chars>"
      # Or, better, use a Docker secret:
      #   MYMEAL_SECRET_KEY_FILE: /run/secrets/mymeal_secret
      # Set to "true" when running behind Home Assistant ingress / a trusted proxy.
      MYMEAL_DISABLE_AUTH: "false"
      MYMEAL_ALLOW_REGISTRATION: "true"
      # AI provider: "claude" | "ollama" | "openai" (blank disables AI features).
      MYMEAL_AI_PROVIDER: ""
      # Provider credentials/models (only the selected provider's are used):
      # MYMEAL_ANTHROPIC_API_KEY: ""
      # MYMEAL_OPENAI_API_KEY: ""
      # MYMEAL_OLLAMA_HOST: "http://host.docker.internal:11434"
    volumes:
      - mymeal-data:/data
    restart: unless-stopped
    # Readiness, not liveness: this reports NOT ready (503) when the database or
    # storage is unusable, so an orchestrator stops sending traffic. An
    # unreachable AI provider deliberately does not affect it.
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:7850/api/v1/health/ready',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mymeal-data:
