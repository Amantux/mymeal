name: HA validate

# Validates the two Home Assistant install paths this repo ships:
#   1. custom_components/mymeal  -> HACS custom integration
#   2. mymeal/config.yaml        -> Supervisor add-on
# These are the checks behind the README badges. They are BLOCKING: a badge that
# stays green while the integration is unloadable is worse than no badge.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # HA and HACS both tighten their requirements over time; a repo that passed
    # at merge can fail months later without a single commit. Catch that.
    - cron: "0 4 * * 1"

jobs:
  hassfest:
    name: hassfest (Home Assistant integration manifest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS (integration installability)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # `brands` checks that the domain is registered in home-assistant/brands,
          # which is a separate PR against an upstream repo we do not control and
          # cannot land from CI. Ignored deliberately and tracked in the README
          # ("Pending external steps"), NOT silently dropped.
          ignore: brands

  addon-lint:
    name: Add-on config lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate add-on config.yaml
        run: |
          python3 - <<'PY'
          import sys, yaml
          cfg = yaml.safe_load(open("mymeal/config.yaml"))
          errors = []

          required = ["name", "version", "slug", "description", "arch", "image"]
          for key in required:
              if not cfg.get(key):
                  errors.append(f"missing required add-on key: {key}")

          # The ingress contract is the whole point of the no-sign-in UX: HA
          # authenticates the user upstream and proxies to ingress_port.
          if not cfg.get("ingress"):
              errors.append("ingress must be true (the add-on is used via the HA sidebar)")
          if cfg.get("ingress_port") != 7850:
              errors.append(f"ingress_port must be 7850, got {cfg.get('ingress_port')}")

          # Sign-in must be OFF by default behind ingress, or every HA user hits
          # a login screen for an app HA already authenticated them into.
          opts = cfg.get("options") or {}
          if opts.get("disable_auth") is not True:
              errors.append("options.disable_auth must default to true (HA ingress already authenticates)")
          schema = cfg.get("schema") or {}
          if schema.get("disable_auth") != "bool":
              errors.append("schema.disable_auth must be declared as bool")

          # GHCR rejects mixed-case namespaces; a capitalised owner silently
          # breaks `docker pull` on every user's box.
          image = cfg.get("image", "")
          if image != image.lower():
              errors.append(f"image must be lowercase (GHCR requirement): {image}")

          if errors:
              print("Add-on config INVALID:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          print(f"Add-on config OK: {cfg['name']} {cfg['version']} -> {cfg['image']}")
          PY

      - name: Validate brand assets
        run: |
          pip install --quiet pillow
          python3 - <<'PY'
          import sys
          from PIL import Image

          # Home Assistant is strict about brand asset dimensions, and the
          # add-on store silently shows a placeholder if icon.png is missing.
          expected = {
              "mymeal/icon.png": (512, 512),
              "mymeal/logo.png": (1024, 340),
              "custom_components/mymeal/brand/icon.png": (256, 256),
              "custom_components/mymeal/brand/icon@2x.png": (512, 512),
              "custom_components/mymeal/brand/logo.png": (512, 170),
              "custom_components/mymeal/brand/logo@2x.png": (1024, 340),
              "frontend/public/favicon.png": (64, 64),
              "frontend/public/apple-touch-icon.png": (180, 180),
          }
          errors = []
          for path, size in expected.items():
              try:
                  img = Image.open(path)
              except FileNotFoundError:
                  errors.append(f"missing brand asset: {path}")
                  continue
              if img.size != size:
                  errors.append(f"{path}: expected {size}, got {img.size}")
              if img.mode != "RGBA":
                  errors.append(f"{path}: expected RGBA, got {img.mode}")
          if errors:
              print("Brand assets INVALID:")
              for e in errors:
                  print(f"  - {e}")
              print("\nRegenerate with: python3 tools/make_logo.py")
              sys.exit(1)
          print(f"Brand assets OK ({len(expected)} files)")
          PY

      - name: Validate HACS + repository metadata
        run: |
          python3 - <<'PY'
          import json, sys, yaml
          errors = []

          hacs = json.load(open("hacs.json"))
          if not hacs.get("name"):
              errors.append("hacs.json: missing name")
          if not hacs.get("homeassistant"):
              errors.append("hacs.json: missing minimum homeassistant version")
          # hacs.json has a CLOSED schema — unknown keys are a hard failure in
          # the HACS action (iot_class belongs in manifest.json, not here).
          allowed = {"name", "homeassistant", "render_readme", "content_in_root",
                     "zip_release", "filename", "hide_default_branch", "country",
                     "persistent_directory"}
          extra = set(hacs) - allowed
          if extra:
              errors.append(f"hacs.json: keys not allowed by the HACS schema: {sorted(extra)}")

          man = json.load(open("custom_components/mymeal/manifest.json"))
          for key in ("domain", "name", "version", "documentation", "issue_tracker", "codeowners"):
              if not man.get(key):
                  errors.append(f"manifest.json: missing {key}")
          if man.get("domain") != "mymeal":
              errors.append(f"manifest.json: domain must be 'mymeal', got {man.get('domain')}")

          # Any HA component we touch at runtime must be declared, or HA may set
          # us up before it exists. __init__.py uses hass.http to serve the
          # Lovelace card, so `http` is mandatory — hassfest enforces this, but
          # catching it here fails in seconds instead of after a container pull.
          src = open("custom_components/mymeal/__init__.py").read()
          if "hass.http" in src and "http" not in (man.get("dependencies") or []):
              errors.append("manifest.json: uses hass.http but 'http' is not in dependencies")

          # hassfest enforces key order: domain, name, then strict alphabetical.
          keys = list(man)
          expected_order = ["domain", "name"] + sorted(k for k in keys
                                                       if k not in ("domain", "name"))
          if keys != expected_order:
              errors.append(f"manifest.json: keys must be ordered {expected_order}, got {keys}")

          # Version drift between the add-on and the integration is a real
          # support burden: users report "0.5.0" and mean two different builds.
          addon = yaml.safe_load(open("mymeal/config.yaml"))
          if man.get("version") != addon.get("version"):
              errors.append(
                  f"version drift: manifest.json={man.get('version')} "
                  f"addon config.yaml={addon.get('version')}"
              )

          repo = yaml.safe_load(open("repository.yaml"))
          if not repo.get("url"):
              errors.append("repository.yaml: missing url")

          # Every documentation URL must point at the repo that actually hosts
          # this code, or HACS sends users somewhere that 404s.
          expected = repo["url"].rstrip("/")
          for label, url in (("documentation", man["documentation"]),
                             ("issue_tracker", man["issue_tracker"])):
              if not url.startswith(expected):
                  errors.append(f"manifest.json {label} ({url}) does not point at {expected}")

          if errors:
              print("HACS metadata INVALID:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          print(f"HACS metadata OK: {man['name']} {man['version']} ({man['domain']})")
          PY
