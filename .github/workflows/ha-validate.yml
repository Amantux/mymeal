name: HA validate

# Validates the two Home Assistant install paths this repo ships:
#   1. custom_components/mymeal  -> HACS custom integration
#   2. mymeal/config.yaml        -> Supervisor add-on
# These are the checks behind the README badges. They are BLOCKING: a badge that
# stays green while the integration is unloadable is worse than no badge.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # HA and HACS both tighten their requirements over time; a repo that passed
    # at merge can fail months later without a single commit. Catch that.
    - cron: "0 4 * * 1"

jobs:
  hassfest:
    name: hassfest (Home Assistant integration manifest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS (integration installability)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # `brands` checks that the domain is registered in home-assistant/brands,
          # which is a separate PR against an upstream repo we do not control and
          # cannot land from CI. Ignored deliberately and tracked in the README
          # ("Pending external steps"), NOT silently dropped.
          ignore: brands

  addon-lint:
    name: Add-on config lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate add-on config.yaml
        run: |
          python3 - <<'PY'
          import sys, yaml
          cfg = yaml.safe_load(open("mymeal/config.yaml"))
          errors = []

          required = ["name", "version", "slug", "description", "arch", "image"]
          for key in required:
              if not cfg.get(key):
                  errors.append(f"missing required add-on key: {key}")

          # The ingress contract is the whole point of the no-sign-in UX: HA
          # authenticates the user upstream and proxies to ingress_port.
          if not cfg.get("ingress"):
              errors.append("ingress must be true (the add-on is used via the HA sidebar)")
          if cfg.get("ingress_port") != 7850:
              errors.append(f"ingress_port must be 7850, got {cfg.get('ingress_port')}")

          # Sign-in must be OFF by default behind ingress, or every HA user hits
          # a login screen for an app HA already authenticated them into.
          opts = cfg.get("options") or {}
          if opts.get("disable_auth") is not True:
              errors.append("options.disable_auth must default to true (HA ingress already authenticates)")
          schema = cfg.get("schema") or {}
          if schema.get("disable_auth") != "bool":
              errors.append("schema.disable_auth must be declared as bool")

          # GHCR rejects mixed-case namespaces; a capitalised owner silently
          # breaks `docker pull` on every user's box.
          image = cfg.get("image", "")
          if image != image.lower():
              errors.append(f"image must be lowercase (GHCR requirement): {image}")

          if errors:
              print("Add-on config INVALID:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          print(f"Add-on config OK: {cfg['name']} {cfg['version']} -> {cfg['image']}")
          PY

      - name: Validate brand assets
        run: |
          pip install --quiet pillow
          python3 - <<'PY'
          import sys
          from PIL import Image

          # Home Assistant is strict about brand asset dimensions, and the
          # add-on store silently shows a placeholder if icon.png is missing.
          expected = {
              "docs/banner.png": (1280, 420),
              "mymeal/icon.png": (512, 512),
              "mymeal/logo.png": (1024, 340),
              "custom_components/mymeal/brand/icon.png": (256, 256),
              "custom_components/mymeal/brand/icon@2x.png": (512, 512),
              "custom_components/mymeal/brand/logo.png": (512, 170),
              "custom_components/mymeal/brand/logo@2x.png": (1024, 340),
              "frontend/public/favicon.png": (64, 64),
              "frontend/public/apple-touch-icon.png": (180, 180),
          }
          errors = []
          for path, size in expected.items():
              try:
                  img = Image.open(path)
              except FileNotFoundError:
                  errors.append(f"missing brand asset: {path}")
                  continue
              if img.size != size:
                  errors.append(f"{path}: expected {size}, got {img.size}")
              if img.mode != "RGBA":
                  errors.append(f"{path}: expected RGBA, got {img.mode}")
          if errors:
              print("Brand assets INVALID:")
              for e in errors:
                  print(f"  - {e}")
              print("\nRegenerate with: python3 tools/make_logo.py")
              sys.exit(1)
          print(f"Brand assets OK ({len(expected)} files)")
          PY

      - name: Validate HACS + repository metadata
        run: |
          python3 - <<'PY'
          import json, sys, yaml
          errors = []

          hacs = json.load(open("hacs.json"))
          if not hacs.get("name"):
              errors.append("hacs.json: missing name")
          if not hacs.get("homeassistant"):
              errors.append("hacs.json: missing minimum homeassistant version")
          # hacs.json has a CLOSED schema — unknown keys are a hard failure in
          # the HACS action (iot_class belongs in manifest.json, not here).
          # Verified against https://hacs.xyz/docs/publish/start (not recalled).
          # `render_readme` is legacy — undocumented now but still accepted by the
          # HACS action; kept because dropping it would change store rendering.
          allowed = {"name", "content_in_root", "zip_release", "filename",
                     "hide_default_branch", "persistent_directory",
                     "homeassistant", "country", "hacs", "render_readme"}
          extra = set(hacs) - allowed
          if extra:
              errors.append(f"hacs.json: keys not allowed by the HACS schema: {sorted(extra)}")

          man = json.load(open("custom_components/mymeal/manifest.json"))
          for key in ("domain", "name", "version", "documentation", "issue_tracker", "codeowners"):
              if not man.get(key):
                  errors.append(f"manifest.json: missing {key}")
          if man.get("domain") != "mymeal":
              errors.append(f"manifest.json: domain must be 'mymeal', got {man.get('domain')}")

          # Any HA component we touch at runtime must be declared, or HA may set
          # us up before it exists. __init__.py uses hass.http to serve the
          # Lovelace card, so `http` is mandatory — hassfest enforces this, but
          # catching it here fails in seconds instead of after a container pull.
          src = open("custom_components/mymeal/__init__.py").read()
          if "hass.http" in src and "http" not in (man.get("dependencies") or []):
              errors.append("manifest.json: uses hass.http but 'http' is not in dependencies")

          # hassfest enforces key order: domain, name, then strict alphabetical.
          keys = list(man)
          expected_order = ["domain", "name"] + sorted(k for k in keys
                                                       if k not in ("domain", "name"))
          if keys != expected_order:
              errors.append(f"manifest.json: keys must be ordered {expected_order}, got {keys}")

          # Version drift between the add-on and the integration is a real
          # support burden: users report "0.5.0" and mean two different builds.
          addon = yaml.safe_load(open("mymeal/config.yaml"))
          if man.get("version") != addon.get("version"):
              errors.append(
                  f"version drift: manifest.json={man.get('version')} "
                  f"addon config.yaml={addon.get('version')}"
              )

          repo = yaml.safe_load(open("repository.yaml"))
          if not repo.get("url"):
              errors.append("repository.yaml: missing url")

          # Every documentation URL must point at the repo that actually hosts
          # this code, or HACS sends users somewhere that 404s.
          expected = repo["url"].rstrip("/")
          for label, url in (("documentation", man["documentation"]),
                             ("issue_tracker", man["issue_tracker"])):
              if not url.startswith(expected):
                  errors.append(f"manifest.json {label} ({url}) does not point at {expected}")

          # Home Assistant renders these two files as the add-on's Documentation
          # and Changelog tabs. Missing = the add-on ships with empty tabs.
          import os as _os
          import re as _re
          for doc in ("mymeal/DOCS.md", "mymeal/CHANGELOG.md"):
              if not _os.path.isfile(doc) or _os.path.getsize(doc) < 200:
                  errors.append(f"missing or near-empty add-on doc: {doc}")

          # The shipped version must appear in the changelog, or a user weighing
          # an update sees no entry for the version they are being offered.
          if _os.path.isfile("mymeal/CHANGELOG.md"):
              ch = open("mymeal/CHANGELOG.md").read()
              if not _re.search(rf"^## {_re.escape(addon['version'])}\b", ch, _re.M):
                  errors.append(
                      f"mymeal/CHANGELOG.md has no '## {addon['version']}' entry "
                      "(the auto-bump inserts a stub; did it fail?)"
                  )

          # The My Home Assistant buttons must point at the repo that hosts this
          # code, or one click sends users to someone else's repository.
          owner_repo = expected.replace("https://github.com/", "")
          readme = open("README.md").read()
          if "my.home-assistant.io/redirect/supervisor_add_addon_repository" not in readme:
              errors.append("README.md: missing the add-on repository My-HA button")
          if "my.home-assistant.io/redirect/hacs_repository" not in readme:
              errors.append("README.md: missing the HACS My-HA button")
          from urllib.parse import quote
          if quote(expected, safe="") not in readme:
              errors.append(
                  f"README.md: the add-on My-HA button does not url-encode {expected}"
              )
          o, _, r = owner_repo.partition("/")
          if f"owner={o}&repository={r}" not in readme:
              errors.append(f"README.md: HACS button does not point at {owner_repo}")

          if errors:
              print("HACS metadata INVALID:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          print(f"HACS metadata OK: {man['name']} {man['version']} ({man['domain']})")
          PY

  config:
    name: Configuration contract
    runs-on: ubuntu-latest
    permissions:
      contents: read          # read-only: this job never publishes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: pip install --quiet -r backend/requirements.txt pytest

      - name: Settings + health + precedence tests
        run: cd backend && python3 -m pytest tests/test_settings.py -q

      - name: Generated config docs are in sync with the code
        # .env.example and docs/configuration.md are generated from the same
        # inventory the app validates against, so they cannot silently drift.
        run: python3 tools/gen_config_docs.py --check

      - name: Every setting is documented, and every documented setting exists
        run: |
          cd backend && python3 - <<'PY'
          import re, sys
          sys.path.insert(0, ".")
          from app.settings import FIELDS
          declared = {f.env_var for f in FIELDS}
          ref = open("../docs/configuration.md").read()
          example = open("../.env.example").read()
          missing_doc = sorted(v for v in declared if v not in ref)
          missing_env = sorted(v for v in declared if v not in example)
          # Anything MYMEAL_* referenced in code but absent from the inventory
          # is a setting nobody documented and nobody validates.
          import subprocess
          used = set(subprocess.run(
              ["grep", "-rhoE", "MYMEAL_[A-Z_]+", "app", "mcp_server.py",
               "ha_discovery.py", "run.py"],
              capture_output=True, text=True).stdout.split())
          used = {u for u in used if not u.endswith("_FILE")}
          undeclared = sorted(used - declared)
          problems = []
          if missing_doc:  problems.append(f"undocumented in configuration.md: {missing_doc}")
          if missing_env:  problems.append(f"missing from .env.example: {missing_env}")
          if undeclared:   problems.append(f"read in code but not declared in settings.FIELDS: {undeclared}")
          if problems:
              print("Configuration inventory is incomplete:")
              for p in problems: print(f"  - {p}")
              sys.exit(1)
          print(f"Inventory complete: {len(declared)} settings, all documented.")
          PY

      - name: Invalid configuration is rejected (not silently accepted)
        run: |
          cd backend
          set +e
          MYMEAL_DISABLE_AUTH=maybe python3 -m app.config_check --ha-options /nonexistent >/dev/null 2>&1
          [ $? -eq 1 ] || { echo "invalid boolean was ACCEPTED"; exit 1; }
          MYMEAL_PORT=70000 python3 -m app.config_check --ha-options /nonexistent >/dev/null 2>&1
          [ $? -eq 1 ] || { echo "out-of-range port was ACCEPTED"; exit 1; }
          MYMEAL_SECRET_KEY=change-me-in-production python3 -m app.config_check --ha-options /nonexistent >/dev/null 2>&1
          [ $? -eq 1 ] || { echo "placeholder secret was ACCEPTED"; exit 1; }
          echo "invalid configurations correctly rejected"

      - name: A minimal safe configuration validates
        run: cd backend && python3 -m app.config_check --ha-options /nonexistent

      - name: config_check never prints secrets
        run: |
          cd backend
          out=$(MYMEAL_SECRET_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
                MYMEAL_OPENAI_API_KEY=sk-canary-must-not-appear \
                python3 -m app.config_check --json --ha-options /nonexistent)
          echo "$out" | grep -q "sk-canary-must-not-appear" && { echo "SECRET LEAKED"; exit 1; }
          echo "$out" | grep -q "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa" && { echo "SECRET LEAKED"; exit 1; }
          echo "no secrets in config_check output"

      - name: Entrypoint shell syntax
        run: sh -n docker-entrypoint.sh

      - name: Docker Compose config is valid
        run: docker compose config -q
