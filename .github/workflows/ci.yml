name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff
      - name: Ruff
        working-directory: backend
        run: ruff check .
      - name: Run pytest
        working-directory: backend
        run: pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund
          npm run build

  validate-addon:
    name: Validate add-on config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate config.yaml / repository.yaml
        run: |
          pip install pyyaml
          python3 - <<'PY'
          import yaml
          cfg = yaml.safe_load(open("mymeal/config.yaml"))
          for f in ("name", "version", "slug", "image", "arch"):
              assert f in cfg, f"config.yaml missing {f}"
          yaml.safe_load(open("repository.yaml"))
          print("add-on config OK, version", cfg["version"])
          PY

# NOTE: multi-arch GHCR publish + version-bump + HACS release pipeline and the
# config.yaml/manifest.json version-lockstep check are added in the HA
# integration milestone, once custom_components/mymeal/manifest.json exists.
